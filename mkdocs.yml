# ======================================================================
# MkDocs 設定 — BoxingGame
# ----------------------------------------------------------------------
# ローカル確認 : python -m mkdocs serve -a 127.0.0.1:8765
# 本番ビルド   : python -m mkdocs build --strict
# GitHub公開   : push すると .github/workflows/deploy.yml が走る
# ======================================================================

site_name: BoxingGame
site_description: アドベンチャー型ボクシングゲームの設計と開発ログ
site_author: hoehoe
site_url: https://annachloe2025.github.io/BoxingGame/

repo_url: https://github.com/annachloe2025/BoxingGame
repo_name: annachloe2025/BoxingGame
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: ja
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: amber
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え
  font:
    text: Noto Sans JP
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - ja
        - en

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/annachloe2025/BoxingGame

copyright: "&copy; 2026 hoehoe"

strict: false
use_directory_urls: true

nav:
  - はじめに: index.md
  - 設計書:
      - design/index.md
      - "00 設計サマリー": design/00_設計サマリー.md
      - "01 目的とコンセプト": design/01_目的とコンセプト.md
      - "02 画面とゲームフロー": design/02_画面とゲームフロー.md
      - "03 戦闘システム": design/03_戦闘システム.md
      - "04 キャラクター": design/04_キャラクター.md
      - "05 テキスト・実況": design/05_テキスト・実況.md
      - "06 アセット方針": design/06_アセット方針.md
      - "07 実装ロードマップ": design/07_実装ロードマップ.md
      - "08 実装数値リファレンス": design/08_実装数値リファレンス.md
