<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>BoxingGame — Prototype v0</title>
<style>
:root {
  --bg: #0a0d12;
  --panel: rgba(10, 13, 18, 0.78);
  --panel-light: rgba(255,255,255,0.06);
  --line: #2a3340;
  --text: #e6edf3;
  --muted: #8b949e;
  --player: #ff5c5c;
  --enemy: #5c9bff;
  --hp-head: linear-gradient(90deg, #ff7a3c, #ffd23c, #4cd964);
  --hp-body: linear-gradient(90deg, #ff7a3c, #ffd23c, #4cd964);
  --commentary: #ffd166;
  --system: #8b949e;
  --line-c: #c9d1d9;
}
* { box-sizing: border-box; }
html,body { margin:0; padding:0; }
body {
  background: #000;
  color: var(--text);
  font-family: "Hiragino Sans","Yu Gothic","Meiryo",system-ui,sans-serif;
  overflow: hidden;
}

#app {
  position: relative;
  width: 100vw;
  height: 100vh;
  height: 100dvh;          /* ブラウザchrome分を引いた実視野 */
  overflow: hidden;
  background: #000 url("../resources/background/boxing_ring_battle_bg.png") center/cover no-repeat;
}
#app::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,.35) 0%, rgba(0,0,0,.15) 50%, rgba(0,0,0,.55) 100%);
}

/* HUD */
.hud {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 5;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 10px 20px 14px;
  gap: 16px;
  background: linear-gradient(180deg, rgba(0,0,0,.65), transparent);
}
.hud .side { display: flex; flex-direction: column; gap: 4px; }
.hud .side.left { align-items: flex-start; }
.hud .side.right { align-items: flex-end; }
.hud .name {
  font-size: 18px; font-weight: 800; letter-spacing: 1px;
  text-shadow: 0 2px 4px rgba(0,0,0,.8);
}
.hud .name.player { color: #ffb6b6; }
.hud .name.enemy { color: #b6cdff; }
.hud .barrow { display: flex; align-items: center; gap: 6px; width: 100%; }
.hud .barrow.right { flex-direction: row-reverse; }
.hud .barlabel { font-size: 11px; font-weight: 700; color: var(--muted); width: 36px; text-align: center; }
.hud .bar {
  flex: 1; height: 14px;
  background: rgba(0,0,0,0.6);
  border: 1px solid var(--line);
  border-radius: 7px;
  position: relative;
  overflow: hidden;
}
.hud .bar > .fill {
  position: absolute; inset: 0 auto 0 0;
  width: 100%;
  background: var(--hp-head);
  transition: width .35s ease;
}
.hud .bar.right > .fill { inset: 0 0 0 auto; }
.hud .center {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  min-width: 180px;
}
.hud .center .vs {
  font-size: 22px; font-weight: 900;
  color: #ffd24c;
  text-shadow: 0 0 8px rgba(255,200,60,.7);
}
.hud .center .round {
  font-size: 18px; font-weight: 900;
  color: #ff6464;
  letter-spacing: 2px;
  text-shadow: 0 2px 4px #000;
}
.hud .center .timer {
  font-family: "Courier New", monospace;
  font-size: 22px; font-weight: 800;
  color: #ffd24c;
  background: rgba(0,0,0,0.7);
  border: 1px solid #5a4a20;
  border-radius: 4px;
  padding: 0 10px;
}
.hud .kd { display: flex; gap: 4px; margin-top: 2px; }
.hud .kd .dot {
  width: 10px; height: 10px; border-radius: 50%;
  border: 1px solid #555;
  background: rgba(0,0,0,.5);
}
.hud .kd .dot.on { background: #ff5c5c; box-shadow: 0 0 6px #ff5c5c; }

/* 立ち絵 */
.fighter {
  position: absolute;
  bottom: 0;
  height: 78%;
  z-index: 2;
  pointer-events: none;
  transition: transform .3s, filter .3s;
}
.fighter.player { left: 1%; transform: scaleX(-1); }   /* 左に立つプレイヤーを右向きに */
.fighter.enemy  { right: 1%; }                          /* 右に立つ敵を左向きに（元絵のまま） */
.fighter img {
  height: 100%;
  display: block;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.6));
}
.fighter.down { filter: grayscale(0.6) brightness(0.5); }

/* 中央パネル */
.center-panel {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 4;
  width: 380px;
  max-height: 78vh;
  max-height: 78dvh;       /* HUD/log とぶつからないように余裕を持たせる */
  overflow-y: auto;
  background: var(--panel);
  border: 1px solid #5a6a85;
  border-radius: 8px;
  padding: 14px;
  box-shadow: 0 0 20px rgba(0,0,0,.5);
  backdrop-filter: blur(2px);
}
.center-panel h4 {
  margin: 0 0 8px; font-size: 12px; color: #b6cdff;
  letter-spacing: 2px; text-transform: uppercase;
}
.cmd-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-bottom: 10px; }
.cmd-grid button {
  background: #1a2535;
  border: 1px solid #4a5568;
  color: var(--text);
  padding: 8px 6px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
}
.cmd-grid button.head { border-left: 3px solid #ff7676; }
.cmd-grid button.body { border-left: 3px solid #76d2ff; }
.cmd-grid button:hover:not(:disabled) { background: #2a3a55; }
.cmd-grid button.selected {
  background: #3a5a85;
  border-color: #80b4ff;
  box-shadow: 0 0 8px rgba(128,180,255,.4);
}

.def-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
.def-grid button {
  background: #1a2535;
  border: 1px solid #4a5568;
  color: var(--text);
  padding: 8px 4px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
}
.def-grid button:hover:not(:disabled) { background: #2a3a55; }
.def-grid button.selected {
  background: #855a3a;
  border-color: #ff9c64;
  box-shadow: 0 0 8px rgba(255,156,100,.4);
}

.confirm-row { display: flex; gap: 8px; }
.confirm-row button.confirm {
  flex: 1;
  background: #c44;
  color: #fff;
  border: 0;
  padding: 10px;
  border-radius: 4px;
  font-weight: 800;
  font-size: 14px;
  cursor: pointer;
}
.confirm-row button.confirm:disabled {
  background: #555;
  cursor: not-allowed;
}

.action-display {
  text-align: center;
  padding: 8px 0;
}
.action-display .scene-img {
  display: none;
  width: 100%;
  max-height: 320px;
  object-fit: contain;
  margin: 0 auto 8px;
  border-radius: 4px;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
}
.action-display .scene-img.show { display: block; }
.action-display .spark {
  font-size: 36px;
  font-weight: 900;
  color: #ffd24c;
  text-shadow: 0 0 12px #ff8a00, 2px 2px 0 #c44;
  margin: 4px 0;
  line-height: 1;
}
.action-display.with-image .spark { font-size: 24px; }
.action-display .meta {
  font-size: 12px;
  color: var(--muted);
  margin: 4px 0;
}

.state-row {
  position: absolute;
  top: 105px;                   /* HUD の真下、中央パネルとぶつからない位置 */
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  display: flex;
  gap: 16px;
  background: var(--panel);
  border: 1px solid var(--line);
  padding: 6px 14px;
  border-radius: 4px;
  font-size: 13px;
}
.state-row .item { display: flex; gap: 4px; align-items: center; }
.state-row .label { color: var(--muted); font-size: 11px; }
.state-row .val { color: var(--text); font-weight: 700; }

.log {
  position: absolute;
  bottom: 12px;
  left: 12px;
  right: 12px;
  z-index: 5;
  height: 100px;
  background: var(--panel);
  border: 1px solid var(--line);
  padding: 8px 14px;
  border-radius: 4px;
  overflow-y: auto;
  font-size: 13px;
  line-height: 1.5;
}
.log .row.commentary { color: var(--commentary); font-weight: 600; }
.log .row.system     { color: var(--system); font-size: 11px; }
.log .row.line       { color: var(--line-c); font-style: italic; }
.log .row.ko         { color: #ff5c5c; font-weight: 800; font-size: 15px; }

/* クリック待ちヒント */
.click-hint {
  position: absolute;
  bottom: 18px; right: 24px;
  z-index: 6;
  color: #ffd24c;
  font-size: 13px;
  font-weight: 700;
  background: rgba(0,0,0,.6);
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid rgba(255,210,76,0.4);
  display: none;
  pointer-events: none;
  animation: blink 1.1s infinite;
}
.click-hint.show { display: block; }
@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.35; }
}

/* キャラ選択 */
.select-screen {
  position: fixed; inset: 0;
  z-index: 100;
  display: flex; flex-direction: column;
  background: #0a0d12;
  padding: 16px 20px;
  overflow: hidden;          /* 全体スクロールはさせない */
}
.select-screen h1 {
  text-align: center;
  color: #ffd24c;
  letter-spacing: 4px;
  margin: 4px 0 10px;
  font-size: 22px;
  flex-shrink: 0;
}
.select-screen .help {
  text-align: center; color: var(--muted);
  margin: 4px 0 10px; font-size: 12px;
  flex-shrink: 0;
}
.select-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  flex: 1;                    /* 余ったスペースを使う */
  overflow-y: auto;           /* グリッドだけスクロール */
  align-content: start;
  padding-right: 4px;
}
.select-grid .card {
  background: #1a2535;
  border: 2px solid #4a5568;
  border-radius: 6px;
  padding: 6px;
  cursor: pointer;
  text-align: center;
  position: relative;
  transition: transform .15s;
}
.select-grid .card:hover { transform: translateY(-3px); border-color: #ffd24c; }
.select-grid .card.player-pick { border-color: #ff5c5c; box-shadow: 0 0 12px rgba(255,92,92,.5); }
.select-grid .card.enemy-pick { border-color: #5c9bff; box-shadow: 0 0 12px rgba(92,155,255,.5); }
.select-grid .card .tag {
  position: absolute; top: 4px; right: 4px;
  background: #c44; color: #fff; padding: 2px 6px;
  border-radius: 3px; font-size: 11px; font-weight: 800;
}
.select-grid .card .tag.enemy { background: #4488cc; }
.select-grid .card img {
  width: 100%;
  aspect-ratio: 2 / 3;        /* 縦長維持しつつ高さ自動 */
  max-height: 32vh;            /* viewport高に応じて縮む */
  max-height: 32dvh;
  object-fit: contain;
}
.select-grid .card .name { font-size: 12px; font-weight: 700; margin-top: 2px; line-height: 1.2; }
.select-grid .card .style { font-size: 10px; color: var(--muted); }
.select-screen .actions {
  margin-top: 10px;
  text-align: center;
  flex-shrink: 0;
}
.select-screen .actions button {
  background: #c44; color: #fff; border: 0;
  padding: 10px 30px; border-radius: 4px; cursor: pointer;
  font-size: 14px; font-weight: 800; letter-spacing: 2px;
}
.select-screen .actions button:disabled { background: #555; cursor: not-allowed; }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,.05); }
::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 4px; }

.down-overlay {
  position: absolute;
  inset: 0;
  z-index: 10;
  background: rgba(0,0,0,.7);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #ff5c5c;
  font-weight: 900;
  font-size: 80px;
  text-shadow: 0 0 20px #c00;
}
.down-overlay.show { display: flex; }
.down-overlay .count {
  font-family: "Courier New", monospace;
  font-size: 100px;
}
</style>
</head>
<body>
<div id="app">
  <div class="hud">
    <div class="side left">
      <div class="name player" id="p-name">プレイヤー</div>
      <div class="barrow"><div class="barlabel">HEAD</div><div class="bar"><div class="fill" id="p-hh"></div></div></div>
      <div class="barrow"><div class="barlabel">BODY</div><div class="bar"><div class="fill" id="p-bh"></div></div></div>
      <div class="barrow"><div class="barlabel">STA</div><div class="bar"><div class="fill" id="p-st" style="background:#7cf"></div></div></div>
      <div class="kd" id="p-kd">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
    <div class="center">
      <div class="vs">VS</div>
      <div class="round" id="round-text">ROUND 1</div>
      <div class="timer" id="timer-text">3:00</div>
    </div>
    <div class="side right">
      <div class="name enemy" id="e-name">敵</div>
      <div class="barrow right"><div class="barlabel">HEAD</div><div class="bar right"><div class="fill" id="e-hh"></div></div></div>
      <div class="barrow right"><div class="barlabel">BODY</div><div class="bar right"><div class="fill" id="e-bh"></div></div></div>
      <div class="barrow right"><div class="barlabel">STA</div><div class="bar right"><div class="fill" id="e-st" style="background:#7cf"></div></div></div>
      <div class="kd" id="e-kd">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  </div>

  <div class="fighter player" id="p-fighter"><img id="p-img" src="" alt="player" /></div>
  <div class="fighter enemy" id="e-fighter"><img id="e-img" src="" alt="enemy" /></div>

  <div class="center-panel" id="center-panel">
    <div id="mode-select">
      <h4>OFFENCE — どこを狙う？</h4>
      <div class="cmd-grid" id="off-grid"></div>
      <h4>DEFENSE — どう受ける？</h4>
      <div class="def-grid" id="def-grid"></div>
      <div class="confirm-row">
        <button class="confirm" id="btn-confirm" disabled>決定</button>
      </div>
    </div>
    <div id="mode-action" style="display:none">
      <h4>ACTION</h4>
      <div class="action-display" id="action-display">
        <img class="scene-img" id="act-scene" alt="" />
        <div class="meta" id="act-atk"></div>
        <div class="spark" id="act-spark">CLASH!</div>
        <div class="meta" id="act-def"></div>
      </div>
    </div>
  </div>

  <div class="state-row" id="state-row">
    <div class="item"><span class="label">距離</span><span class="val" id="dist-val">中距離</span></div>
    <div class="item"><span class="label">PL位置</span><span class="val" id="p-pos">中央</span></div>
    <div class="item"><span class="label">EN位置</span><span class="val" id="e-pos">中央</span></div>
    <div class="item"><span class="label">ターン</span><span class="val" id="turn-val">1/12</span></div>
  </div>

  <div class="log" id="log"></div>
  <div class="click-hint" id="click-hint">▼ クリック / Enter で進む</div>

  <div class="down-overlay" id="down-ov">
    <div>DOWN!</div>
    <div class="count" id="down-count">1</div>
  </div>
</div>

<div class="select-screen" id="select-screen">
  <h1>EXHIBITION — 選手を選べ</h1>
  <div class="help" id="select-help">クリックで <span style="color:#ff5c5c">プレイヤー</span> を選択。もう1回クリックで <span style="color:#5c9bff">敵</span> 選択。</div>
  <div class="select-grid" id="select-grid"></div>
  <div class="actions">
    <button id="btn-start" disabled>FIGHT!</button>
  </div>
</div>

<script>
const CHARACTERS = [
  { id:1, name:"エリー・ヴィオラ", style:"アウトボクサー",
    img:"standing/01_エリー_ヴィオラ_standing.png",
    stats:{ head_hp:140, body_hp:140, punch_power:12, endurance:13, stamina:17, toughness:12, counter:14,
            jab_atk:18, jab_def:16, straight_atk:16, straight_def:14, hook_atk:12, hook_def:12, upper_atk:10, upper_def:11 } },

            jab_atk:12, jab_def:11, straight_atk:14, straight_def:12, hook_atk:17, hook_def:12, upper_atk:17, upper_def:12 } },
  { id:5, name:"桜野 アイリ", style:"コントロール",

            jab_atk:14, jab_def:16, straight_atk:13, straight_def:15, hook_atk:12, hook_def:16, upper_atk:11, upper_def:15 } },
  { id:6, name:"橙川 ヒカリ", style:"ラッシュ",

    stats:{ head_hp:130, body_hp:130, punch_power:14, endurance:12, stamina:16, toughness:13, counter:11,

  { id:8, name:"シオン・水無月", style:"コントロール",
    img:"standing/08_シオン_水無月_standing.png",
    stats:{ head_hp:130, body_hp:130, punch_power:12, endurance:13, stamina:15, toughness:13, counter:14,
            jab_atk:17, jab_def:15, straight_atk:15, straight_def:14, hook_atk:13, hook_def:13, upper_atk:11, upper_def:13 } },
  { id:9, name:"リン・スカーレット", style:"プレッシャー",

    stats:{ head_hp:150, body_hp:150, punch_power:16, endurance:15, stamina:14, toughness:15, counter:11,
            jab_atk:13, jab_def:12, straight_atk:13, straight_def:12, hook_atk:17, hook_def:12, upper_atk:15, upper_def:12 } },
  { id:10, name:"ハルカ・緑里", style:"テクニック",
    img:"standing/10_ハルカ_緑里_standing.png",
    stats:{ head_hp:130, body_hp:130, punch_power:11, endurance:12, stamina:14, toughness:13, counter:17,
            jab_atk:14, jab_def:16, straight_atk:13, straight_def:16, hook_atk:12, hook_def:16, upper_atk:11, upper_def:15 } },
];

const TECHS = {
  jab:      { label:"ジャブ",      base_dmg:5,  base_hit:80, speed:8, sta:5  },
  straight: { label:"ストレート",  base_dmg:11, base_hit:65, speed:5, sta:12 },
  hook:     { label:"フック",      base_dmg:18, base_hit:50, speed:3, sta:18 },
  upper:    { label:"アッパー",    base_dmg:22, base_hit:60, speed:3, sta:20 },
};
const ZONES = ["HEAD","BODY"];
const DEFS = {
  guard_h:   { label:"ガード上",   kind:"guard",   zone:"HEAD" },
  guard_b:   { label:"ガード下",   kind:"guard",   zone:"BODY" },
  ducking:   { label:"ダッキング", kind:"evade",   move:-1 },
  sway:      { label:"スウェー",   kind:"evade",   move:+1 },
  counter:   { label:"カウンター", kind:"counter" },
};

const DIST_NAMES = ["クリンチ","近距離","中距離","遠距離","離れ気味"];
const DIST_MOD = {
  jab:      [-10,  0,  0,  0,  0],
  straight: [-30,-10,  0,+15,-10],
  hook:     [-10,  0,+15,-10,-30],
  upper:    [  0,+15,  0,-20,-40],
};
const EVADE_RATE = { HEAD:0.55, BODY:0.25 };
const COUNTER_RATE = { HEAD:0.30, BODY:0.50 };
const POS_NAMES = ["中央","ロープ際","コーナー際"];
const POS_PENALTY_HIT = [0, -10, -25];
const POS_PENALTY_EVADE = [0, -0.15, -0.30];

// シーン画像マッピング（攻撃技 × ターゲット → ファイル名）
const SCENE_FILES_ATTACK = {
  jab_HEAD:      null,
  jab_BODY:      "Attack_BodyJab.png",
  straight_HEAD: "Attack_Straight_Head.png",
  straight_BODY: "Attack_Straight_Body.png",
  hook_HEAD:     "Attack_Hook_Head.png",
  hook_BODY:     "Attack_Hook_Body.png",
  upper_HEAD:    "Attack_Upper_Head.png",
  upper_BODY:    null,
};
// キャラ別シーンフォルダ
const SCENES_AVAILABLE = {
  1: "01_エリー_ヴィオラ",
  // 2 以降はキャラ画像が揃ったら追加
};
function getAttackSceneImage(charDef, off) {
  const folder = SCENES_AVAILABLE[charDef.id];
  if (!folder) return null;
  const filename = SCENE_FILES_ATTACK[`${off.tech}_${off.zone}`];
  if (!filename) return null;
  return `../resources/scenes/${folder}/${filename}`;
}

const state = {
  player: null, enemy: null,
  round: 1, turn: 1,
  distance: 2,
  selectedOff: null, selectedDef: null,
  pendingPlayerCmd: null, pendingEnemyCmd: null,
  mode: "select",
  busy: false,
  ended: false,
};

function makeRuntime(charDef, who) {
  const s = charDef.stats;
  return {
    def: charDef,
    name: charDef.name,
    who: who,
    head_hp: s.head_hp, head_hp_max: s.head_hp,
    body_hp: s.body_hp, body_hp_max: s.body_hp,
    sta: s.stamina, sta_max: s.stamina,
    kd: 0,
    pos: 0,
    stats: s,
  };
}

function $(id) { return document.getElementById(id); }
function pct(v,m) { return Math.max(0, Math.min(100, 100 * v / m)); }

function refreshUI() {
  const p = state.player, e = state.enemy;
  if (!p || !e) return;
  $("p-name").textContent = p.name;
  $("e-name").textContent = e.name;
  $("p-hh").style.width = pct(p.head_hp, p.head_hp_max) + "%";
  $("p-bh").style.width = pct(p.body_hp, p.body_hp_max) + "%";
  $("p-st").style.width = pct(p.sta, p.sta_max) + "%";
  $("e-hh").style.width = pct(e.head_hp, e.head_hp_max) + "%";
  $("e-bh").style.width = pct(e.body_hp, e.body_hp_max) + "%";
  $("e-st").style.width = pct(e.sta, e.sta_max) + "%";

  const updateDots = (id, kd) => {
    const dots = $(id).children;
    for (let i=0; i<dots.length; i++) {
      dots[i].classList.toggle("on", i < kd);
    }
  };
  updateDots("p-kd", p.kd);
  updateDots("e-kd", e.kd);

  $("dist-val").textContent = DIST_NAMES[state.distance];
  $("p-pos").textContent = POS_NAMES[p.pos];
  $("e-pos").textContent = POS_NAMES[e.pos];
  $("turn-val").textContent = `${state.turn}/12`;
  $("round-text").textContent = `ROUND ${state.round}`;
  const remaining = (12 - state.turn + 1) * 15;
  const m = Math.floor(remaining/60), s = remaining%60;
  $("timer-text").textContent = `${m}:${String(s).padStart(2,"0")}`;
}

function logRow(cls, text) {
  const log = $("log");
  const r = document.createElement("div");
  r.className = "row " + cls;
  r.textContent = text;
  log.appendChild(r);
  log.scrollTop = log.scrollHeight;
}
function clearLog() { $("log").innerHTML = ""; }

let clickResolver = null;
function waitForClick() {
  return new Promise(resolve => {
    clickResolver = resolve;
    $("click-hint").classList.add("show");
  });
}
function resolveClick() {
  if (clickResolver) {
    const r = clickResolver;
    clickResolver = null;
    $("click-hint").classList.remove("show");
    r();
  }
}
document.addEventListener("click", () => { if (state.mode === "action") resolveClick(); });
document.addEventListener("keydown", (e) => {
  if (state.mode === "action" && (e.key === "Enter" || e.key === " ")) {
    e.preventDefault();
    resolveClick();
  }
});

function setMode(m) {
  state.mode = m;
  $("mode-select").style.display = (m === "select") ? "" : "none";
  $("mode-action").style.display = (m === "action") ? "" : "none";
}

function rng() { return Math.random(); }
function clamp(v,lo,hi) { return Math.max(lo, Math.min(hi, v)); }

function computeAttack(atk, def, off) {
  const t = TECHS[off.tech];
  const aStat = atk.stats[off.tech + "_atk"];
  const dStat = def.stats[off.tech + "_def"];
  let hit = t.base_hit
          + DIST_MOD[off.tech][state.distance]
          + (aStat - dStat) * 1.5
          + POS_PENALTY_HIT[atk.pos];
  if (atk.sta < t.sta) hit -= 15;
  hit = clamp(hit, 5, 95);

  const powMod = atk.stats.punch_power / 14;
  const techMod = aStat / 14;
  const endMod = 14 / def.stats.endurance;
  let dmg = t.base_dmg * powMod * techMod * endMod;
  if (atk.sta < t.sta) dmg *= 0.5;
  dmg = Math.max(1, Math.round(dmg));

  return { hit, dmg, tech: off.tech, zone: off.zone, label: t.label };
}

function counterChance(atk, def, off) {
  const base = COUNTER_RATE[off.zone];
  const techMod = (def.stats.counter - 14) * 0.02;
  const techDef = def.stats[off.tech + "_def"] * 0.005;
  return clamp(base + techMod + techDef + POS_PENALTY_EVADE[def.pos], 0.05, 0.95);
}

function evadeChance(atk, def, off) {
  const base = EVADE_RATE[off.zone];
  const techDef = def.stats[off.tech + "_def"] * 0.005;
  const speedMod = (def.stats.stamina - atk.stats.stamina) * 0.005;
  return clamp(base + techDef + speedMod + POS_PENALTY_EVADE[def.pos], 0.05, 0.90);
}

// 攻撃を解決して結果オブジェクトを返す（ログは出さない、ダメージは適用する）
function resolveAttack(atk, def, off, defCmd) {
  const a = computeAttack(atk, def, off);
  atk.sta = Math.max(0, atk.sta - TECHS[off.tech].sta);
  const defLabel = DEFS[defCmd].label;

  if (defCmd === "guard_h" || defCmd === "guard_b") {
    const guardZone = DEFS[defCmd].zone;
    if (off.zone === guardZone) {
      return { type:"guarded", dmg:0, defLabel };
    } else {
      const isHit = rng()*100 < a.hit;
      if (!isHit) return { type:"miss", dmg:0, defLabel };
      applyDmg(def, off.zone, a.dmg);
      return { type:"hit", dmg:a.dmg, defLabel };
    }
  }

  if (defCmd === "ducking" || defCmd === "sway") {
    const ev = evadeChance(atk, def, off);
    if (rng() < ev) {
      const dir = DEFS[defCmd].move;
      state.distance = clamp(state.distance + dir, 0, 4);
      return { type:"evaded", dmg:0, defLabel };
    } else {
      const isHit = rng()*100 < a.hit;
      if (!isHit) return { type:"miss", dmg:0, defLabel };
      applyDmg(def, off.zone, a.dmg);
      return { type:"hit", dmg:a.dmg, defLabel };
    }
  }

  if (defCmd === "counter") {
    const cc = counterChance(atk, def, off);
    if (rng() < cc) {
      const counterDmg = Math.round(a.dmg * 1.3);
      applyDmg(atk, off.zone, counterDmg);
      return { type:"counter_success", dmg:counterDmg, defLabel };
    } else {
      const failDmg = Math.round(a.dmg * 1.3);
      applyDmg(def, off.zone, failDmg);
      return { type:"counter_fail", dmg:failDmg, defLabel };
    }
  }

  return { type:"unknown", dmg:0, defLabel };
}

// 結果に応じた実況テキスト
function resultLogText(result, atk, def, off) {
  switch (result.type) {
    case "guarded":         return `${def.name}は${result.defLabel}でガード！（ダメージなし）`;
    case "miss":            return `空を切った！`;
    case "hit":             return `${def.name}に${result.dmg}ダメージ！`;
    case "evaded":          return `${def.name}は${result.defLabel}で回避！`;
    case "counter_success": return `${def.name}カウンター成功！${atk.name}に${result.dmg}ダメージで返し撃ち！`;
    case "counter_fail":    return `${def.name}カウンター失敗！${result.dmg}ダメージをもろに食らう！`;
    default:                return `…`;
  }
}

// 結果に応じた中央パネルの大文字（spark）
function resultSparkText(result, off) {
  switch (result.type) {
    case "guarded":         return "GUARD";
    case "miss":            return "MISS";
    case "hit":             return `${result.dmg} HIT!`;
    case "evaded":          return "EVADED";
    case "counter_success": return `COUNTER ${result.dmg}!`;
    case "counter_fail":    return `BACKFIRE ${result.dmg}`;
    default:                return "...";
  }
}

function applyDmg(target, zone, dmg) {
  if (zone === "HEAD") target.head_hp = Math.max(0, target.head_hp - dmg);
  else                 target.body_hp = Math.max(0, target.body_hp - dmg);
}

function aiPick(self, opp) {
  const techs = ["jab","straight","hook","upper"];
  const distOk = (t) => DIST_MOD[t][state.distance] >= -10;
  const techWeights = techs.map(t => ({
    t,
    w: (self.stats[t+"_atk"] / 14) * (distOk(t) ? 1 : 0.3) * (self.sta < TECHS[t].sta ? 0.3 : 1)
  }));
  if (self.stats.punch_power > 16) {
    techWeights.find(x=>x.t==="hook").w *= 1.4;
    techWeights.find(x=>x.t==="upper").w *= 1.4;
  }
  const tw = pickWeighted(techWeights);
  const zone = (opp.head_hp / opp.head_hp_max < opp.body_hp / opp.body_hp_max) ? "HEAD" : (rng() < 0.5 ? "HEAD" : "BODY");

  const defOpts = [];
  if (self.sta < 10) {
    defOpts.push({d:"guard_h", w:1}, {d:"guard_b", w:1});
  } else if (self.stats.counter > 16) {
    defOpts.push({d:"counter", w:2.5}, {d:"guard_h", w:1}, {d:"guard_b", w:1}, {d:"ducking", w:0.5}, {d:"sway", w:0.5});
  } else {
    defOpts.push({d:"guard_h", w:1.5}, {d:"guard_b", w:1.5}, {d:"ducking", w:1}, {d:"sway", w:1}, {d:"counter", w:0.5});
  }
  const dw = pickWeighted(defOpts.map(o => ({t:o.d, w:o.w})));

  return { off:{ tech:tw, zone:zone }, def:dw };
}

function pickWeighted(items) {
  const tot = items.reduce((s,x)=>s+x.w, 0);
  let r = rng() * tot;
  for (const x of items) { r -= x.w; if (r <= 0) return x.t; }
  return items[items.length-1].t;
}

async function executeTurn() {
  if (state.busy || state.ended) return;
  state.busy = true;
  setMode("action");
  clearLog();

  const p = state.player, e = state.enemy;
  const pCmd = state.pendingPlayerCmd;
  const eCmd = state.pendingEnemyCmd;

  logRow("system", `--- ターン ${state.turn} (R${state.round}) 距離:${DIST_NAMES[state.distance]} ---`);
  logRow("line", `${p.name}: ${TECHS[pCmd.off.tech].label}(${pCmd.off.zone}) + ${DEFS[pCmd.def].label}`);
  logRow("line", `${e.name}: ${TECHS[eCmd.off.tech].label}(${eCmd.off.zone}) + ${DEFS[eCmd.def].label}`);

  const speedDiff = (p.stats.stamina + (TECHS[pCmd.off.tech].speed||0))
                  - (e.stats.stamina + (TECHS[eCmd.off.tech].speed||0));
  const pFirstChance = clamp(0.5 + speedDiff * 0.025, 0.1, 0.9);
  const playerFirst = rng() < pFirstChance;

  showAction(p, e, pCmd, eCmd);
  await waitForClick();

  if (playerFirst) {
    await runResolution("p", pCmd, eCmd);
    if (!state.ended) await runResolution("e", pCmd, eCmd);
  } else {
    await runResolution("e", pCmd, eCmd);
    if (!state.ended) await runResolution("p", pCmd, eCmd);
  }

  if (!state.ended) {
    p.sta = Math.min(p.sta_max, p.sta + 3);
    e.sta = Math.min(e.sta_max, e.sta + 3);
    state.turn++;
    if (state.turn > 12) {
      logRow("system", `=== ラウンド ${state.round} 終了 ===`);
      if (state.round >= 3) {
        const pSum = p.head_hp + p.body_hp;
        const eSum = e.head_hp + e.body_hp;
        if (pSum > eSum) endMatch("player", "判定勝ち");
        else if (eSum > pSum) endMatch("enemy", "判定勝ち");
        else endMatch(null, "ドロー");
      } else {
        state.round++;
        state.turn = 1;
        // インターバル回復: HP×10 にスケールしたので比例的に上げた
        p.head_hp = Math.min(p.head_hp_max, p.head_hp + 20);
        p.body_hp = Math.min(p.body_hp_max, p.body_hp + 20);
        e.head_hp = Math.min(e.head_hp_max, e.head_hp + 20);
        e.body_hp = Math.min(e.body_hp_max, e.body_hp + 20);
        p.sta = p.sta_max; e.sta = e.sta_max;
        p.kd = 0; e.kd = 0;
        p.pos = 0; e.pos = 0;
        state.distance = 2;
        logRow("commentary", `インターバル… セコンドが声をかける。`);
      }
    }
    refreshUI();
    setMode("select");
    state.selectedOff = null; state.selectedDef = null;
    updateCmdHighlight();
    state.busy = false;
  }
}

async function runResolution(who, pCmd, eCmd) {
  const isPlayer = who === "p";
  const atk = isPlayer ? state.player : state.enemy;
  const def = isPlayer ? state.enemy : state.player;
  const off = isPlayer ? pCmd.off : eCmd.off;
  const defCmd = isPlayer ? eCmd.def : pCmd.def;

  // ── Phase 1: 攻撃宣言（攻撃画像と「{atk}の{tech}({zone}) →」だけ表示） ──
  showAction(state.player, state.enemy, pCmd, eCmd, who);
  const techLabel = TECHS[off.tech].label;
  logRow("commentary", `${atk.name}の${techLabel}(${off.zone}) →`);
  await waitForClick();

  // ── Phase 2: 結果解決と表示 ──
  const result = resolveAttack(atk, def, off, defCmd);
  logRow("commentary", resultLogText(result, atk, def, off));
  // 中央パネルの大きな文字（SPARK）を結果に置き換え
  $("act-spark").textContent = resultSparkText(result, off);
  refreshUI();
  await waitForClick();

  // ── ダウン演出 ──
  if (def.head_hp <= 0 || def.body_hp <= 0) {
    await handleDown(def);
  }
}

async function handleDown(victim) {
  victim.kd++;
  logRow("ko", `${victim.name} ダウン！`);
  $("down-ov").classList.add("show");

  const tough = victim.stats.toughness;
  const recoveryBuf = victim.head_hp_max * 0.10;
  const baseRate = 0.7;
  let getUp = baseRate
            * Math.max(0.05, (victim.head_hp + recoveryBuf) / victim.head_hp_max)
            * Math.max(0.05, (victim.body_hp + recoveryBuf) / victim.body_hp_max)
            * (tough / 14)
            * (1 - (state.round - 1) * 0.1);
  getUp = clamp(getUp, 0.05, 0.95);

  for (let i=1; i<=10; i++) {
    $("down-count").textContent = i;
    await sleep(380);
  }
  const standUp = rng() < getUp;
  if (!standUp) {
    $("down-count").textContent = "10!";
    logRow("ko", `${victim.name} カウントアウト！ 10カウントKO！`);
    await sleep(1200);
    $("down-ov").classList.remove("show");
    endMatch(victim === state.player ? "enemy" : "player", "KO");
    return;
  }
  const heal = Math.round(victim.head_hp_max * 0.30);
  victim.head_hp = Math.max(1, victim.head_hp + heal);
  victim.body_hp = Math.max(1, victim.body_hp + heal);
  logRow("commentary", `${victim.name} 立ち上がった！ HEAD/BODY +${heal}回復`);
  await sleep(800);
  $("down-ov").classList.remove("show");
  refreshUI();

  if (victim.kd >= 3) {
    logRow("ko", `${victim.name} 3ノックダウン！ TKO負け！`);
    endMatch(victim === state.player ? "enemy" : "player", "TKO");
  }
}

function endMatch(winner, kind) {
  state.ended = true;
  state.busy = false;
  if (winner === null) {
    logRow("ko", `試合終了！ ドロー！`);
  } else {
    const w = state[winner];
    logRow("ko", `${kind}！ 勝者: ${w.name}`);
  }
  setMode("action");
  $("act-spark").textContent = winner === "player" ? "WIN!" : (winner === "enemy" ? "LOSE..." : "DRAW");
  $("act-atk").textContent = ""; $("act-def").textContent = "";
}

function showAction(p, e, pCmd, eCmd, focus) {
  const pl = `${p.name}: ${TECHS[pCmd.off.tech].label}(${pCmd.off.zone}) / ${DEFS[pCmd.def].label}`;
  const en = `${e.name}: ${TECHS[eCmd.off.tech].label}(${eCmd.off.zone}) / ${DEFS[eCmd.def].label}`;
  let sceneImg = null;
  if (focus === "p") {
    $("act-atk").textContent = pl; $("act-def").textContent = en;
    $("act-spark").textContent = TECHS[pCmd.off.tech].label.toUpperCase()+"!";
    sceneImg = getAttackSceneImage(state.player.def, pCmd.off);
  }
  else if (focus === "e") {
    $("act-atk").textContent = en; $("act-def").textContent = pl;
    $("act-spark").textContent = TECHS[eCmd.off.tech].label.toUpperCase()+"!";
    sceneImg = getAttackSceneImage(state.enemy.def, eCmd.off);
  }
  else {
    $("act-atk").textContent = pl; $("act-def").textContent = en;
    $("act-spark").textContent = "READY...";
  }
  const img = $("act-scene");
  const display = $("action-display");
  if (sceneImg) {
    img.src = sceneImg;
    img.classList.add("show");
    display.classList.add("with-image");
  } else {
    img.classList.remove("show");
    img.removeAttribute("src");
    display.classList.remove("with-image");
  }
}

function buildOffenseGrid() {
  const g = $("off-grid");
  g.innerHTML = "";
  ["jab","straight","hook","upper"].forEach(t => {
    ZONES.forEach(z => {
      const btn = document.createElement("button");
      btn.className = z === "HEAD" ? "head" : "body";
      btn.dataset.cmd = t;
      btn.dataset.zone = z;
      btn.innerHTML = `${z === "HEAD" ? "↑" : "↓"} ${TECHS[t].label}`;
      btn.onclick = () => { state.selectedOff = { tech:t, zone:z }; updateCmdHighlight(); };
      g.appendChild(btn);
    });
  });
}
function buildDefenseGrid() {
  const g = $("def-grid");
  g.innerHTML = "";
  Object.keys(DEFS).forEach(d => {
    const btn = document.createElement("button");
    btn.dataset.def = d;
    btn.textContent = DEFS[d].label;
    btn.onclick = () => { state.selectedDef = d; updateCmdHighlight(); };
    g.appendChild(btn);
  });
}
function updateCmdHighlight() {
  document.querySelectorAll("#off-grid button").forEach(b => {
    const sel = state.selectedOff && b.dataset.cmd === state.selectedOff.tech && b.dataset.zone === state.selectedOff.zone;
    b.classList.toggle("selected", !!sel);
  });
  document.querySelectorAll("#def-grid button").forEach(b => {
    b.classList.toggle("selected", state.selectedDef === b.dataset.def);
  });
  $("btn-confirm").disabled = !(state.selectedOff && state.selectedDef);
}
$("btn-confirm").onclick = () => {
  if (!state.selectedOff || !state.selectedDef) return;
  state.pendingPlayerCmd = { off: state.selectedOff, def: state.selectedDef };
  state.pendingEnemyCmd = aiPick(state.enemy, state.player);
  executeTurn();
};

let selPlayer = null, selEnemy = null;

function buildSelectGrid() {
  const g = $("select-grid");
  g.innerHTML = "";
  CHARACTERS.forEach(c => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = c.id;
    card.innerHTML = `
      <img src="../resources/chara/${c.img}" alt="${c.name}" onerror="this.style.display='none'" />
      <div class="name">${c.name}</div>
      <div class="style">${c.style}</div>
    `;
    card.onclick = () => {
      if (selPlayer === null) {
        selPlayer = c.id;
        card.classList.add("player-pick");
        const tag = document.createElement("div"); tag.className = "tag"; tag.textContent = "PL"; card.appendChild(tag);
      } else if (selEnemy === null && c.id !== selPlayer) {
        selEnemy = c.id;
        card.classList.add("enemy-pick");
        const tag = document.createElement("div"); tag.className = "tag enemy"; tag.textContent = "EN"; card.appendChild(tag);
      } else if (c.id === selPlayer) {
        selPlayer = null;
        card.classList.remove("player-pick");
        card.querySelectorAll(".tag").forEach(t => t.remove());
      } else if (c.id === selEnemy) {
        selEnemy = null;
        card.classList.remove("enemy-pick");
        card.querySelectorAll(".tag").forEach(t => t.remove());
      }
      $("btn-start").disabled = !(selPlayer && selEnemy);
    };
    g.appendChild(card);
  });
}
$("btn-start").onclick = () => {
  const pDef = CHARACTERS.find(c => c.id === selPlayer);
  const eDef = CHARACTERS.find(c => c.id === selEnemy);
  state.player = makeRuntime(pDef, "player");
  state.enemy = makeRuntime(eDef, "enemy");
  $("p-img").src = "../resources/chara/" + pDef.img;
  $("e-img").src = "../resources/chara/" + eDef.img;
  $("select-screen").style.display = "none";
  buildOffenseGrid(); buildDefenseGrid();
  refreshUI();
  setMode("select");
  logRow("commentary", "ゴング！第1ラウンド開始だ！");
  logRow("system", `${state.player.name} vs ${state.enemy.name}`);
};

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

buildSelectGrid();
</script>
